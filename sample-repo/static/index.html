<!DOCTYPE html>
<html>
<head>
    <title>AutoDeploy Static | Env Test</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #050505; 
            color: white; 
            margin: 0;
        }
        .card { 
            padding: 3rem; 
            background: #111; 
            border-radius: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            border: 1px solid #222; 
            text-align: center;
            max-width: 500px;
        }
        h1 { 
            color: #3b82f6; 
            text-transform: uppercase; 
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 0.75rem;
            font-size: 0.8rem;
            font-weight: bold;
            color: #666;
            margin-top: 1rem;
        }
        .signature {
            color: #10b981;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Static Stack</h1>
        <p>Deployment successful via AutoDeploy Orchestrator.</p>
        
        <div class="status">
            BUILD SIGNATURE: <span class="signature">VERSION_PLACEHOLDER</span>
        </div>
        
        <p style="font-size: 0.7rem; color: #444; margin-top: 2rem; line-height: 1.5;">
            TIP: To test build-time injection, add a Pre-Build step:<br>
            <code>sed -i "s/VERSION_PLACEHOLDER/PROD-ALPHA-1/g" index.html</code>
        </p>
    </div>
</body>
</html>
